name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-setuptools \
            python3-venv \
            autoconf \
            automake \
            libtool \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            ninja-build \
            pkg-config \
            ccache \
            git \
            wget \
            unzip \
            openjdk-17-jdk-headless \
            libc6-dev \
            libx11-dev \
            libgles2-mesa-dev \
            libmtdev-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android debug
        timeout-minutes: 45

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AirController-APK
          path: |
            bin/*.apk
          retention-days: 30
