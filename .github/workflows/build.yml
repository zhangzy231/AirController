name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-setuptools \
            python3-venv \
            autoconf \
            automake \
            libtool \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            libgdbm-dev \
            libbz2-dev \
            libsqlite3-dev \
            libreadline-dev \
            cmake \
            ninja-build \
            pkg-config \
            ccache \
            git \
            wget \
            unzip \
            zip \
            openjdk-11-jdk-headless \
            libc6-dev \
            libx11-dev \
            libgles2-mesa-dev \
            libmtdev-dev

      - name: Setup JDK
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV
          echo "PATH=/usr/lib/jvm/java-11-openjdk-amd64/bin:$PATH" >> $GITHUB_ENV

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          unset ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK ANDROID_HOME ANDROID_SDK_ROOT
          buildozer android debug 2>&1
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AirController-APK
          path: |
            bin/*.apk
          retention-days: 30
